<!DOCTYPE html>
<html>
<head>
  <title>Smart Parking</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PREMIUM GRADIENT BACKGROUND -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header class="header">
  <h1>PARKING CONTROL</h1>
</header>

<section class="grid">

  <div class="card glass">
    <div class="label">TOTAL</div>
    <div id="total" class="value">0</div>
  </div>

  <div class="card glass occupied-card" id="occupiedCard">
    <div class="label">OCCUPIED</div>
    <div id="occupied" class="value">0</div>
  </div>

  <div class="card glass vacant-card" id="vacantCard">
    <div class="label">VACANT</div>
    <div id="vacant" class="value">0</div>
  </div>

</section>

<!-- 🚗 LAMBORGHINI -->
<div id="car-container">
  <img id="car" src="car.png" />
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="script.js"></script>

</body>
</html>
